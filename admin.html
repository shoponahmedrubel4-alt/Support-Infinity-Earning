<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Infinity Earning</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* SAME DESIGN (UNCHANGED) */
:root {
    --primary: #00f2c3;
    --accent: #d4af37;
    --bg-dark: #050d1a;
    --card-bg: #0f1724;
    --text-gray: #7d8b9a;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background-color: var(--bg-dark); color: white; padding: 20px; }

.admin-container { max-width: 900px; margin: 0 auto; }

.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1a2533; padding-bottom: 15px; }
.admin-header h2 { font-size: 20px; color: var(--accent); }
.admin-header span { font-size: 12px; color: var(--primary); background: rgba(0, 242, 195, 0.1); padding: 5px 12px; border-radius: 20px; }

.tabs { display: flex; gap: 10px; margin-bottom: 25px; }
.tab-btn { flex: 1; padding: 12px; border: none; background: var(--card-bg); color: var(--text-gray); border-radius: 10px; cursor: pointer; font-weight: 600; }
.tab-btn.active { background: var(--primary); color: #000; }

.card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #1a2533; display: none; }
.card.active { display: block; }

.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-size: 13px; color: var(--text-gray); margin-bottom: 8px; }
.input-group input, .input-group select {
    width: 100%; padding: 12px; background: #070e1a; border: 1px solid #1a2533;
    border-radius: 10px; color: white;
}

.submit-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; color: #000; }

.video-item {
    display: flex; align-items: center; gap: 15px; background: #070e1a;
    padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #1a2533;
}
.video-thumb { width: 80px; height: 50px; border-radius: 8px; }
.video-info { flex: 1; }

.btn-delete {
    background: rgba(255, 82, 82, 0.1);
    color: #ff5252;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="admin-container">

<div class="admin-header">
    <h2>Infinity Earning</h2>
    <span>Admin Active</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('addVideo', this)">Add New Video</button>
    <button class="tab-btn" onclick="showTab('manageVideos', this)">Video List</button>
</div>

<div id="addVideo" class="card active">
    <div class="input-group">
        <input type="text" id="vidTitle" placeholder="Video Title">
    </div>

    <div class="input-group">
        <select id="vidCategory">
            <option value="General">General</option>
            <option value="Video Editing">Video Editing</option>
            <option value="Photo Editing">Photo Editing</option>
            <option value="Data Entry">Data Entry</option>
            <option value="Digital Marketing">Digital Marketing</option>
        </select>
    </div>

    <div class="input-group">
        <input type="text" id="vidLink" placeholder="YouTube Link">
    </div>

    <button class="submit-btn" onclick="addNewVideo()">ADD VIDEO</button>
</div>

<div id="manageVideos" class="card">
    <div id="videoListContainer"></div>
</div>

</div>

<script>
function showTab(id, btn){
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}
</script>

<!-- 🔥 FIREBASE FULL FIX -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXabUDi_fyG70-EV1ozzU3k_OIr-id8-Q",
  authDomain: "support-infinityearning.firebaseapp.com",
  projectId: "support-infinityearning",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADD VIDEO
window.addNewVideo = async function () {
    let title = vidTitle.value;
    let category = vidCategory.value;
    let link = vidLink.value;

    if(!title || !link) return alert("Fill all fields");

    await addDoc(collection(db,"videos"),{
        title, category, link,
        createdAt: new Date()
    });

    alert("Added!");
    vidTitle.value = "";
    vidLink.value = "";

    loadVideos();
}

// LOAD VIDEO LIST
window.loadVideos = async function(){
    let snap = await getDocs(collection(db,"videos"));
    let box = document.getElementById("videoListContainer");

    box.innerHTML = "";

    snap.forEach(d=>{
        let v = d.data();
        let id = d.id;

        let vid = v.link.split("v=")[1]?.split("&")[0];

        box.innerHTML += `
        <div class="video-item">
            <img src="https://img.youtube.com/vi/${vid}/default.jpg" class="video-thumb">
            <div class="video-info">
                <h4>${v.title}</h4>
                <p>${v.category}</p>
            </div>
            <button class="btn-delete" onclick="deleteVideo('${id}')">Delete</button>
        </div>
        `;
    });
}

// DELETE VIDEO
window.deleteVideo = async function(id){
    await deleteDoc(doc(db,"videos",id));
    alert("Deleted!");
    loadVideos();
}

loadVideos();
</script>

</body>
</html>
