<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Infinity Earning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2c3;
            --accent: #d4af37;
            --bg-dark: #050d1a;
            --card-bg: #0f1724;
            --text-gray: #7d8b9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: white; padding: 20px; }

        .admin-container { max-width: 900px; margin: 0 auto; }

        /* Header */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1a2533; padding-bottom: 15px; }
        .admin-header h2 { font-size: 20px; color: var(--accent); }
        .admin-header span { font-size: 12px; color: var(--primary); background: rgba(0, 242, 195, 0.1); padding: 5px 12px; border-radius: 20px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: var(--card-bg); color: var(--text-gray); border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Forms */
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #1a2533; display: none; }
        .card.active { display: block; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-gray); margin-bottom: 8px; }
        .input-group input, .input-group select { 
            width: 100%; padding: 12px; background: #070e1a; border: 1px solid #1a2533; 
            border-radius: 10px; color: white; outline: none; 
        }

        .submit-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; color: #000; font-size: 16px; }

        /* Video List Management */
        .video-item { 
            display: flex; align-items: center; gap: 15px; background: #070e1a; 
            padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #1a2533;
        }
        .video-thumb { width: 80px; height: 50px; border-radius: 8px; object-fit: cover; }
        .video-info { flex: 1; }
        .video-info h4 { font-size: 14px; margin-bottom: 4px; }
        .video-info p { font-size: 11px; color: var(--primary); }

        .action-btns { display: flex; gap: 8px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-edit { background: rgba(0, 242, 195, 0.1); color: var(--primary); }
        .btn-delete { background: rgba(255, 82, 82, 0.1); color: #ff5252; }

        /* Status Toast */
        #status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 25px; border-radius: 30px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h2>Infinity Earning</h2>
                <p style="font-size: 11px; color: var(--text-gray);">Video Management System</p>
            </div>
            <span>Admin Active</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('addVideo', this)">Add New Video</button>
            <button class="tab-btn" onclick="showTab('manageVideos', this)">Already Added Video</button>
        </div>

        <div id="addVideo" class="card active">
            <h3 style="margin-bottom: 20px;">Upload Content</h3>
            
            <div class="input-group">
                <label>Video Title</label>
                <input type="text" id="vidTitle" placeholder="Enter video title...">
            </div>

            <div class="input-group">
                <label>Video Category</label>
                <select id="vidCategory">
                    <option value="General">General</option>
                    <option value="Video Editing">Video Editing</option>
                    <option value="Photo Editing">Photo Editing</option>
                    <option value="Data Entry">Data Entry</option>
                    <option value="Digital Marketing">Digital Marketing</option>
                </select>
            </div>

            <div class="input-group">
                <label>YouTube Video Link</label>
                <input type="text" id="vidLink" placeholder="https://youtube.com/watch?v=...">
            </div>

            <button class="submit-btn" onclick="addNewVideo()">ADD NEW VIDEO <i class="fas fa-plus-circle"></i></button>
        </div>

        <div id="manageVideos" class="card">
            <h3 style="margin-bottom: 20px;">Video List</h3>
            <div id="videoListContainer">
                <div class="video-item">
                    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/default.jpg" class="video-thumb">
                    <div class="video-info">
                        <h4>Introduction to E-learning</h4>
                        <p>Category: General</p>
                    </div>
                    <div class="action-btns">
                        <button class="btn-icon btn-edit"><i class="fas fa-edit"></i></button>
                        <button class="btn-icon btn-delete"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="status">Video Added Successfully!</div>

    <script>
        // Tab Switching Logic
        function showTab(tabId, btn) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // Logic for adding video (Temporary Frontend Logic)
        function addNewVideo() {
            const title = document.getElementById('vidTitle').value;
            const category = document.getElementById('vidCategory').value;
            const link = document.getElementById('vidLink').value;

            if(!title || !link) {
                alert("Please fill all fields!");
                return;
            }

            // Simple success notification
            const status = document.getElementById('status');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2000);

            // Clear inputs
            document.getElementById('vidTitle').value = '';
            document.getElementById('vidLink').value = '';
        }

        // Delete confirmation
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.onclick = function() {
                if(confirm("Are you sure you want to delete this video?")) {
                    this.closest('.video-item').remove();
                }
            }
        });
    </script>
    
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXabUDi_fyG70-EV1ozzU3k_OIr-id8-Q",
  authDomain: "support-infinityearning.firebaseapp.com",
  projectId: "support-infinityearning",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GLOBAL FUNCTION (important)
window.addNewVideo = async function () {
    const title = document.getElementById('vidTitle').value;
    const category = document.getElementById('vidCategory').value;
    const link = document.getElementById('vidLink').value;

    if(!title || !link){
        alert("Fill all fields!");
        return;
    }

    try {
        await addDoc(collection(db, "videos"), {
            title,
            category,
            link,
            createdAt: new Date()
        });

        alert("Video Added Successfully!");
    } catch(e){
        alert("Error: " + e);
    }
}
</script>
</body>
</html>
